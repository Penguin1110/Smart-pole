<!DOCTYPE html>

<style>
/* 氣象地圖頁專屬樣式（共用樣式已移至 kh_theme.css） */
/* 本頁使用 'Noto Sans TC' 字型與微調配色，覆寫 theme 預設值 */
html, body { background: #0d1117; color: #e2e8f0; font-family: 'Noto Sans TC', system-ui, sans-serif; }
body { display: flex; flex-direction: column; }

/* ── Header ── */
#header{
  flex-shrink:0;height:52px;
  background:#161b27;border-bottom:1px solid #1e2d40;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  overflow-x:auto;overflow-y:hidden;white-space:nowrap;
}
#header::-webkit-scrollbar{height:3px}
#header::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}

.logo{font-size:15px;font-weight:800;color:#e94560;letter-spacing:0.5px;flex-shrink:0}
nav{display:flex;gap:2px;flex-shrink:0}
nav a{color:#64748b;text-decoration:none;font-size:11px;padding:3px 8px;
  border-radius:4px;transition:color .15s,background .15s}
nav a:hover{color:#e2e8f0;background:#1e2d40}
.divider{width:1px;height:22px;background:#1e2d40;flex-shrink:0}

.ctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
.ctrl label{font-size:11px;color:#64748b;cursor:pointer;user-select:none}
.ctrl input[type=checkbox]{cursor:pointer;accent-color:#e94560;width:13px;height:13px}

select,input[type=date]{
  background:#0d1117;color:#e2e8f0;
  border:1px solid #1e3a5f;border-radius:4px;
  padding:3px 7px;font-size:11px;cursor:pointer;
}
select:focus,input[type=date]:focus{outline:none;border-color:#3b82f6}

#hour-slider{
  -webkit-appearance:none;appearance:none;
  width:110px;height:4px;background:#1e3a5f;
  border-radius:2px;cursor:pointer;border:none;padding:0;outline:none;
}
#hour-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;
  border-radius:50%;background:#e94560;cursor:pointer;
}
#hour-label{font-size:12px;font-weight:700;color:#63b3ed;min-width:42px;text-align:center}

#play-btn{
  background:#e94560;color:#fff;border:none;border-radius:4px;

}

/* ── Map container ── */

#time-badge{

}

.li{display:flex;align-items:center;gap:6px;margin:2px 0}

/* ── Footer chart ── */

  flex-shrink:0;height:200px;

}

/* ── Loading overlay ── */
#loading{
  position:fixed;inset:0;z-index:9999;

}
.spinner{
  width:36px;height:36px;
  border:3px solid #1e3a5f;border-top-color:#e94560;

/* Leaflet popup dark theme */

  background:#161b27;color:#e2e8f0;border:1px solid #1e3a5f;

}
.leaflet-popup-tip{background:#161b27}

<body>

<div id="loading">

<div id="header">

  <div class="divider"></div>

  <div class="ctrl">

    <input type="range" id="hour-slider" min="0" max="23" step="1" value="14">

  <button id="play-btn">▶ 播放</button>
  <select id="speed-sel" title="播放速度">
    <option value="1">1×</option>

  </select>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="time-badge">—</div>
  <div id="legend">
    <h4>PM2.5 (μg/m³)</h4>
    <div class="li"><div class="sw" style="background:rgba(0,228,0,0.75)"></div> ≤ 12　優</div>
    <div class="li"><div class="sw" style="background:rgba(255,255,0,0.75)"></div> 12–35　良</div>
    <div class="li"><div class="sw" style="background:rgba(255,126,0,0.75)"></div> 35–54　普通</div>
    <div class="li"><div class="sw" style="background:rgba(255,60,60,0.75)"></div> 54–150　不良</div>
    <div class="li"><div class="sw" style="background:rgba(143,63,151,0.75)"></div> > 150　危害</div>
    <div style="margin-top:6px;padding-top:5px;border-top:1px solid #1e3a5f">
      <div class="li"><div style="width:18px;height:2px;background:#ffff00;opacity:0.75"></div> 等值線</div>
      <div class="li" style="font-size:9px;color:#64748b">H = 高濃度熱點 &nbsp; L = 低濃度冷點</div>
    </div>
  </div>
</div>

<div id="footer">
  <canvas id="ts-chart"></canvas>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════
let TIMESERIES  = [];
let SENSOR_META = {};
let TIME_INDEX  = {};   // "2025-12-04 14:00" → array index
let MAP, colorOverlay, contourGroup, extremaGroup, stationGroup;
let tsChart;
let playTimer   = null;
let debounceTimer = null;
let currentGrid = null; // cached for canvas-only redraw on pan

// ═══════════════════════════════════════════════
// Colour helpers
// ═══════════════════════════════════════════════
function pm25Rgba(v) {
  if (v == null) return 'rgba(0,0,0,0)';
  if (v <= 12)  return 'rgba(0,228,0,0.75)';
  if (v <= 25)  return 'rgba(180,220,0,0.75)';
  if (v <= 35)  return 'rgba(255,255,0,0.75)';
  if (v <= 54)  return 'rgba(255,126,0,0.75)';
  if (v <= 150) return 'rgba(255,60,60,0.75)';
  return 'rgba(143,63,151,0.75)';
}

function pm25Hex(v) {
  if (v == null) return '#888';
  if (v <= 12)  return '#00e400';
  if (v <= 25)  return '#b4dc00';
  if (v <= 35)  return '#ffff00';
  if (v <= 54)  return '#ff7e00';
  if (v <= 150) return '#ff3c3c';
  return '#8f3f97';
}

// ═══════════════════════════════════════════════
// IDW Grid
// ═══════════════════════════════════════════════
function buildGrid(points, N = 60, power = 2) {
  if (!MAP) return null;
  const valid = points.filter(p => p.value != null && isFinite(p.value));
  if (valid.length < 3) return null;

  const b   = MAP.getBounds();
  const lat0 = b.getNorth(), lat1 = b.getSouth();
  const lng0 = b.getWest(),  lng1 = b.getEast();

  const grid = [];
  for (let r = 0; r < N; r++) {
    grid[r] = [];
    const lat = lat0 - (r / (N - 1)) * (lat0 - lat1);
    for (let c = 0; c < N; c++) {
      const lng = lng0 + (c / (N - 1)) * (lng1 - lng0);
      let wSum = 0, vSum = 0;
      for (let i = 0; i < valid.length; i++) {
        const p  = valid[i];
        const d  = Math.sqrt((lat - p.lat) ** 2 + (lng - p.lng) ** 2) + 1e-9;
        const w  = 1 / Math.pow(d, power);
        wSum += w;
        vSum += w * p.value;
      }
      grid[r][c] = { lat, lng, value: vSum / wSum };
    }
  }
  return grid;
}

// ═══════════════════════════════════════════════
// Canvas Overlay (IDW colour band)
// ═══════════════════════════════════════════════
const ColorOverlay = L.Layer.extend({
  initialize() {
    this._grid   = null;
    this._colorFn = () => 'rgba(0,0,0,0)';
    this._canvas  = null;
  },
  onAdd(map) {
    this._map = map;
    const canvas = document.createElement('canvas');
    canvas.style.cssText =
      'position:absolute;top:0;left:0;pointer-events:none;opacity:0.5;z-index:399';
    map.getContainer().appendChild(canvas);
    this._canvas = canvas;
    map.on('move moveend zoomend', this._paint, this);
    this._paint();
  },
  onRemove(map) {
    if (this._canvas) this._canvas.remove();
    map.off('move moveend zoomend', this._paint, this);
  },
  setData(grid, colorFn) {
    this._grid   = grid;
    this._colorFn = colorFn;
    this._paint();
  },
  clear() {
    this._grid = null;
    if (!this._canvas) return;
    const ctx = this._canvas.getContext('2d');
    ctx.clearRect(0, 0, this._canvas.width, this._canvas.height);
  },
  _paint() {
    if (!this._map || !this._canvas) return;
    const size = this._map.getSize();
    this._canvas.width  = size.x;
    this._canvas.height = size.y;
    const ctx = this._canvas.getContext('2d');
    ctx.clearRect(0, 0, size.x, size.y);
    if (!this._grid) return;

    const N  = this._grid.length;
    const M  = this._grid[0].length;
    const cw = size.x / M + 1;
    const ch = size.y / N + 1;

    for (let r = 0; r < N; r++) {
      for (let c = 0; c < M; c++) {
        const cell = this._grid[r][c];
        const px   = this._map.latLngToContainerPoint([cell.lat, cell.lng]);
        ctx.fillStyle = this._colorFn(cell.value);
        ctx.fillRect(px.x - cw / 2, px.y - ch / 2, cw, ch);
      }
    }
  }
});

// ═══════════════════════════════════════════════
// Contour lines (Marching Squares per cell edge)
// ═══════════════════════════════════════════════
const CONTOUR_LEVELS = [
  { iso: 12,  color: '#00e400' },
  { iso: 25,  color: '#b4dc00' },
  { iso: 35,  color: '#ffff00' },
  { iso: 54,  color: '#ff7e00' },
  { iso: 100, color: '#ff3c3c' },
  { iso: 150, color: '#8f3f97' },
];

function drawContours(grid, group) {
  group.clearLayers();
  if (!grid) return;

  const N = grid.length, M = grid[0].length;

  CONTOUR_LEVELS.forEach(({ iso, color }) => {
    const segs = [];

    for (let r = 0; r < N - 1; r++) {
      for (let c = 0; c < M - 1; c++) {
        const tl = grid[r][c],     tr = grid[r][c + 1];
        const bl = grid[r + 1][c], br = grid[r + 1][c + 1];
        const vtl = tl.value, vtr = tr.value;
        const vbl = bl.value, vbr = br.value;

        const pts = [];

        // top edge
        if ((vtl < iso) !== (vtr < iso)) {
          const f = (iso - vtl) / (vtr - vtl);
          pts.push([tl.lat, tl.lng + f * (tr.lng - tl.lng)]);
        }
        // right edge
        if ((vtr < iso) !== (vbr < iso)) {
          const f = (iso - vtr) / (vbr - vtr);
          pts.push([tr.lat + f * (br.lat - tr.lat), tr.lng]);
        }
        // bottom edge
        if ((vbl < iso) !== (vbr < iso)) {
          const f = (iso - vbl) / (vbr - vbl);
          pts.push([bl.lat, bl.lng + f * (br.lng - bl.lng)]);
        }
        // left edge
        if ((vtl < iso) !== (vbl < iso)) {
          const f = (iso - vtl) / (vbl - vtl);
          pts.push([tl.lat + f * (bl.lat - tl.lat), tl.lng]);
        }

        if (pts.length === 2) segs.push(pts);
      }
    }

    segs.forEach(seg =>
      L.polyline(seg, { color, weight: 1.5, opacity: 0.75 })
       .addTo(group)
       .bindTooltip(`PM2.5 ${iso} μg/m³`, { sticky: true })
    );
  });
}

// ═══════════════════════════════════════════════
// Extrema (H = high conc., L = low conc.)
// ═══════════════════════════════════════════════
function findExtrema(grid, radius = 6) {
  const N = grid.length, M = grid[0].length;
  const highs = [], lows = [];

  for (let r = radius; r < N - radius; r++) {
    for (let c = radius; c < M - radius; c++) {
      const v = grid[r][c].value;
      let isH = true, isL = true;

      outer:
      for (let dr = -radius; dr <= radius; dr++) {
        for (let dc = -radius; dc <= radius; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nv = grid[r + dr]?.[c + dc]?.value;
          if (nv == null) continue;
          if (nv > v) isH = false;
          if (nv < v) isL = false;
          if (!isH && !isL) break outer;
        }
      }

      if (isH) highs.push({ lat: grid[r][c].lat, lng: grid[r][c].lng, value: v });
      if (isL)  lows.push({ lat: grid[r][c].lat, lng: grid[r][c].lng, value: v });
    }
  }

  const dedupe = (pts, d = 0.15) =>
    pts.filter((p, i) => !pts.slice(0, i).some(
      q => Math.hypot(p.lat - q.lat, p.lng - q.lng) < d
    ));

  return { highs: dedupe(highs), lows: dedupe(lows) };
}

function renderExtrema(group, highs, lows) {
  group.clearLayers();

  function icon(label, bg, val) {
    return L.divIcon({
      html: `<div style="
        background:${bg};border:2px solid rgba(255,255,255,.6);
        border-radius:50%;width:36px;height:36px;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        font-weight:800;color:#fff;font-size:15px;line-height:1;
        box-shadow:0 2px 8px rgba(0,0,0,.55);">
        <span>${label}</span>
        <span style="font-size:8px;font-weight:400;opacity:.9">${val.toFixed(0)}</span>
      </div>`,
      iconSize: [36, 36], iconAnchor: [18, 18], className: ''
    });
  }

  highs.forEach(p =>
    L.marker([p.lat, p.lng], { icon: icon('H', '#b91c1c', p.value), zIndexOffset: 500 })
     .addTo(group)
     .bindTooltip(`熱點 ${p.value.toFixed(1)} μg/m³`)
  );
  lows.forEach(p =>
    L.marker([p.lat, p.lng], { icon: icon('L', '#1d4ed8', p.value), zIndexOffset: 500 })
     .addTo(group)
     .bindTooltip(`低濃度 ${p.value.toFixed(1)} μg/m³`)
  );
}

// ═══════════════════════════════════════════════
// Station bubble labels
// ═══════════════════════════════════════════════
function renderStations(group, sensors) {
  group.clearLayers();

  Object.values(sensors).forEach(s => {
    if (!s.lat || s.pm25 == null) return;
    const col = pm25Hex(s.pm25);
    const shortName = s.name.length > 7 ? s.name.slice(0, 7) + '…' : s.name;

    const icon = L.divIcon({
      html: `<div style="
        background:rgba(13,17,23,.88);border:2px solid ${col};
        border-radius:6px;padding:2px 6px;min-width:68px;text-align:center;
        box-shadow:0 2px 6px rgba(0,0,0,.4);">
        <div style="font-size:9px;color:#94a3b8;line-height:1.2">${shortName}</div>
        <div style="font-size:13px;font-weight:700;color:${col};line-height:1.3">${s.pm25.toFixed(1)}</div>
        <div style="font-size:8px;color:#64748b">μg/m³</div>
      </div>`,
      iconSize: [72, 50], iconAnchor: [36, 25], className: ''
    });

    L.marker([s.lat, s.lng], { icon, zIndexOffset: 200 })
     .addTo(group)
     .bindPopup(`
       <strong>${s.name}</strong><br>
       地區：${s.town}<br>
       PM2.5：<span style="color:${col};font-weight:700">${s.pm25.toFixed(1)} μg/m³</span>
     `);
  });
}

// ═══════════════════════════════════════════════
// Snapshot helper
// ═══════════════════════════════════════════════
function getSnapshot(date, hour) {
  const t   = `${date} ${String(hour).padStart(2, '0')}:00`;
  const idx = TIME_INDEX[t];
  const rec = idx !== undefined ? TIMESERIES[idx] : null;

  const sensors = {};
  Object.entries(SENSOR_META).forEach(([id, meta]) => {
    sensors[id] = {
      id,
      name: meta.name || meta.area || id,
      town: meta.town || '',
      lat:  meta.lat,
      lng:  meta.lon,        // kh_sensor_meta uses "lon"
      pm25: rec ? (rec[id] ?? null) : null
    };
  });
  return sensors;
}

// ═══════════════════════════════════════════════
// Main redraw
// ═══════════════════════════════════════════════
function scheduleUpdate(rebuildGrid = true) {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => redrawAll(rebuildGrid), 150);
}

function redrawAll(rebuildGrid = true) {
  const date = document.getElementById('date-pick').value;
  const hour = +document.getElementById('hour-slider').value;

  document.getElementById('hour-label').textContent =
    String(hour).padStart(2, '0') + ':00';
  document.getElementById('time-badge').textContent =
    `${date}　${String(hour).padStart(2, '0')}:00`;

  const sensors = getSnapshot(date, hour);

  const points = Object.values(sensors)
    .filter(s => s.lat && s.pm25 != null)
    .map(s => ({ lat: s.lat, lng: s.lng, value: s.pm25 }));

  if (rebuildGrid) {
    currentGrid = buildGrid(points);
  }

  const chkColor    = document.getElementById('chk-color').checked;
  const chkContour  = document.getElementById('chk-contour').checked;
  const chkHL       = document.getElementById('chk-hl').checked;
  const chkStations = document.getElementById('chk-stations').checked;

  if (chkColor && currentGrid) {
    colorOverlay.setData(currentGrid, pm25Rgba);
  } else {
    colorOverlay.clear();
  }

  if (chkContour && currentGrid) {
    drawContours(currentGrid, contourGroup);
  } else {
    contourGroup.clearLayers();
  }

  if (chkHL && currentGrid) {
    const { highs, lows } = findExtrema(currentGrid);
    renderExtrema(extremaGroup, highs, lows);
  } else {
    extremaGroup.clearLayers();
  }

  if (chkStations) {
    renderStations(stationGroup, sensors);
  } else {
    stationGroup.clearLayers();
  }

  updateChart(date, hour);
}

// ═══════════════════════════════════════════════
// Timeseries chart (footer)
// ═══════════════════════════════════════════════
const CHART_COLORS = [
  '#ef4444','#3b82f6','#22c55e','#f59e0b','#8b5cf6',
  '#06b6d4','#ec4899','#14b8a6','#f97316','#6366f1',
  '#84cc16','#0ea5e9','#e11d48','#7c3aed','#059669',
  '#d97706','#2563eb','#dc2626','#16a34a','#9333ea',
  '#0891b2','#b45309','#4f46e5','#15803d','#a21caf',
  '#0369a1','#c2410c','#7e22ce'
];

function initChart() {
  const ctx = document.getElementById('ts-chart').getContext('2d');
  tsChart = new Chart(ctx, {
    type: 'line',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'nearest', intersect: false, axis: 'x' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(13,17,23,.92)',
          borderColor: '#1e3a5f',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#e2e8f0',
          callbacks: {
            label: c => `${c.dataset.label}：${c.parsed.y != null ? c.parsed.y.toFixed(1) : '—'} μg/m³`
          }
        },
        annotation: {
          annotations: {
            cursor: {
              type: 'line',
              scaleID: 'x',
              value: '',
              borderColor: '#e94560',
              borderWidth: 2,
              label: {
                display: true,
                content: '▼',
                color: '#e94560',
                position: 'start',
                font: { size: 9 },
                backgroundColor: 'transparent',
                padding: 0
              }
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#64748b', font: { size: 10 },
            maxTicksLimit: 13, maxRotation: 0,
            callback(v, i) {
              const lbl = this.getLabelForValue(v);
              return lbl ? lbl.split(' ')[1] : '';
            }
          },
          grid: { color: '#1e2d40' }
        },
        y: {
          min: 0,
          ticks: { color: '#64748b', font: { size: 10 } },
          grid: { color: '#1e2d40' },
          title: { display: true, text: 'PM2.5 (μg/m³)', color: '#64748b', font: { size: 10 } }
        }
      }
    }
  });

  // Click → jump to that time
  document.getElementById('ts-chart').addEventListener('click', evt => {
    if (!tsChart || !tsChart.data.labels.length) return;
    const elems = tsChart.getElementsAtEventForMode(evt, 'nearest', { intersect: false }, false);
    if (!elems.length) return;
    const label = tsChart.data.labels[elems[0].index];
    if (!label) return;
    const [d, hStr] = label.split(' ');
    document.getElementById('date-pick').value = d;
    document.getElementById('hour-slider').value = parseInt(hStr);
    scheduleUpdate();
  });
}

function updateChart(date, hour) {
  if (!tsChart) return;

  const t   = `${date} ${String(hour).padStart(2, '0')}:00`;
  const cur = TIME_INDEX[t];
  if (cur === undefined) return;

  const s0  = Math.max(0, cur - 12);
  const s1  = Math.min(TIMESERIES.length - 1, cur + 12);
  const win = TIMESERIES.slice(s0, s1 + 1);

  const labels   = win.map(r => r.time);
  const ids      = Object.keys(SENSOR_META);

  // Individual sensor lines (thin, semi-transparent)
  const datasets = ids.map((id, i) => ({
    label:       SENSOR_META[id]?.name || id,
    data:        win.map(r => r[id] ?? null),
    borderColor: CHART_COLORS[i % CHART_COLORS.length],
    borderWidth: 1,
    pointRadius: 0,
    tension:     0.25,
    fill:        false,
    spanGaps:    true,
    borderOpacity: 0.4
  }));

  // Mean line
  const meanData = win.map(r => {
    const vals = ids.map(id => r[id]).filter(v => v != null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  });
  datasets.push({
    label:       '平均',
    data:        meanData,
    borderColor: '#ffffff',
    borderWidth: 2.5,
    pointRadius: 0,
    tension:     0.3,
    fill:        false,
    spanGaps:    true
  });

  tsChart.data.labels   = labels;
  tsChart.data.datasets = datasets;

  // Move annotation
  tsChart.options.plugins.annotation.annotations.cursor.value = t;

  tsChart.update('none');
}

// ═══════════════════════════════════════════════
// Play / Pause
// ═══════════════════════════════════════════════
function getPlayIntervalMs() {
  return 1000 / (+document.getElementById('speed-sel').value);
}

function stopPlay() {
  if (playTimer) { clearInterval(playTimer); playTimer = null; }
  const btn = document.getElementById('play-btn');
  btn.textContent = '▶ 播放';
  btn.classList.remove('active');
}

function startPlay() {
  stopPlay();
  const btn = document.getElementById('play-btn');
  btn.textContent = '⏸ 暫停';
  btn.classList.add('active');

  playTimer = setInterval(() => {
    const slider = document.getElementById('hour-slider');
    const h = +slider.value;
    if (h >= 23) { stopPlay(); return; }
    slider.value = h + 1;
    scheduleUpdate();
  }, getPlayIntervalMs());
}

document.getElementById('play-btn').addEventListener('click', () => {
  playTimer ? stopPlay() : startPlay();
});
document.getElementById('speed-sel').addEventListener('change', () => {
  if (playTimer) startPlay(); // restart with new speed
});

// ═══════════════════════════════════════════════
// Slider / date / layer checkbox events
// ═══════════════════════════════════════════════
document.getElementById('hour-slider').addEventListener('input', () => scheduleUpdate());
document.getElementById('date-pick').addEventListener('change', () => { stopPlay(); scheduleUpdate(); });
['chk-color','chk-contour','chk-hl','chk-stations'].forEach(id =>
  document.getElementById(id).addEventListener('change', () => scheduleUpdate(false))
);

// ═══════════════════════════════════════════════
// Initialise
// ═══════════════════════════════════════════════
async function init() {
  try {
    const [ts, meta] = await Promise.all([
      fetch('kh_timeseries.json').then(r => { if (!r.ok) throw new Error('kh_timeseries.json 載入失敗'); return r.json(); }),
      fetch('kh_sensor_meta.json').then(r => { if (!r.ok) throw new Error('kh_sensor_meta.json 載入失敗'); return r.json(); })
    ]);

    TIMESERIES  = ts;
    SENSOR_META = meta;
    ts.forEach((rec, i) => { TIME_INDEX[rec.time] = i; });

    // Default: last available date, 14:00
    const lastDate = ts[ts.length - 1].time.split(' ')[0];
    document.getElementById('date-pick').value    = lastDate;
    document.getElementById('hour-slider').value  = 14;

    // ── Leaflet map ──
    MAP = L.map('map', { zoomControl: true, preferCanvas: false })
            .setView([22.62, 120.35], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors © <a href="https://carto.com">CARTO</a>',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(MAP);

    // Layers (order: color → contour → extrema → stations)
    colorOverlay = new ColorOverlay();
    colorOverlay.addTo(MAP);

    contourGroup  = L.layerGroup().addTo(MAP);
    extremaGroup  = L.layerGroup().addTo(MAP);
    stationGroup  = L.layerGroup().addTo(MAP);

    // Rebuild grid after pan/zoom
    MAP.on('moveend zoomend', () => scheduleUpdate(true));

    // Chart
    initChart();

    // First draw after map settles
    setTimeout(() => redrawAll(true), 300);

    document.getElementById('loading').style.display = 'none';

  } catch (err) {
    console.error(err);
    const el = document.getElementById('loading');
    el.innerHTML = `<p style="color:#e94560;font-size:14px">❌ 資料載入失敗</p>
                    <p style="color:#64748b;font-size:12px;margin-top:6px">${err.message}</p>`;
  }
}

init();
</script>
