<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>高雄微型感測器地圖總覽</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="kh_theme.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* 感測器地圖頁專屬樣式（共用樣式已移至 kh_theme.css） */
.badge{background:var(--acc);color:#000;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}
.badge-info{background:#263238;color:var(--muted);padding:2px 8px;border-radius:10px;font-size:11px;}
#main{display:flex;height:calc(100vh - 50px - 145px);}
#map{flex:1;min-width:0;}
#rpanel{width:320px;background:var(--card);border-left:1px solid var(--brd);display:flex;flex-direction:column;overflow:hidden;}
#srch{margin:10px;padding:6px 10px;background:var(--bg);border:1px solid var(--brd);border-radius:4px;color:var(--txt);width:calc(100% - 20px);font-size:12px;outline:none;}
#srch:focus{border-color:var(--acc);}
#devlist{flex:1;overflow-y:auto;padding:0 8px 8px;}
#devlist::-webkit-scrollbar{width:4px;}
#devlist::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px;}
.dcard{background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;}
.dcard:hover{border-color:var(--acc);}
.dcard.sel{border-color:var(--acc);background:rgba(79,195,247,.05);}
.dtop{display:flex;justify-content:space-between;align-items:center;gap:6px;}
.dname{font-size:12px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pbadge{font-size:13px;font-weight:700;padding:2px 8px;border-radius:9px;white-space:nowrap;min-width:54px;text-align:center;}
.dmeta{font-size:10px;color:var(--muted);margin-top:2px;}
.spark{height:36px;margin-top:5px;}
#hmapbox{height:145px;background:var(--card);border-top:1px solid var(--brd);padding:8px 14px 4px;display:flex;flex-direction:column;}
#hmapbox h3{font-size:11px;color:var(--muted);margin-bottom:4px;flex-shrink:0;}
#hmap{display:block;flex:1;width:100%;}
</style>
</head>
<body>
<div id="err-banner">⚠ 資料載入失敗 — 請在此目錄執行 <code>python -m http.server 8080</code> 後重新開啟</div>
<header id="hdr">
  <h1>高雄微型感測器地圖總覽</h1>
  <span class="badge" id="dcnt">載入中…</span>
  <span class="badge-info" id="drange"></span>
  <nav>
    <a href="kh_sensor_map.html" class="active">地圖總覽</a>
    <a href="kh_dashboard.html">儀表板</a>
  </nav>
</header>
<div id="main">
  <div id="map"></div>
  <div id="rpanel">
    <input id="srch" type="search" placeholder="搜尋裝置名稱 / 區域…">
    <div id="devlist"></div>
  </div>
</div>
<div id="hmapbox">
  <h3>日均值熱圖（橫軸=日期  縱軸=感測器  色彩=PM2.5 AQI）</h3>
  <canvas id="hmap"></canvas>
</div>

<script>
const KH_CENTER=[22.63,120.30],KH_ZOOM=11;
const KH_EPA={
  zuoying: {name:'左營(EPA)',lat:22.6900,lng:120.2956},
  qianjin: {name:'前金(EPA)',lat:22.6270,lng:120.2960},
  qianzhen:{name:'前鎮(EPA)',lat:22.5895,lng:120.3143},
  nanzi:   {name:'楠梓(EPA)',lat:22.7299,lng:120.3249},
  fengshan:{name:'鳳山(EPA)',lat:22.6278,lng:120.3567},
  daliao:  {name:'大寮(EPA)',lat:22.5986,lng:120.4043},
  linyuan: {name:'林園(EPA)',lat:22.4967,lng:120.3966},
};

function aqiColor(v){
  if(v==null)return'#546e7a';
  if(v<=12)return'#00e400';if(v<=35)return'#ffff00';
  if(v<=54)return'#ff7e00';if(v<=150)return'#ff0000';
  return'#8f3f97';
}
function aqiLabel(v){
  if(v==null)return'無資料';
  if(v<=12)return'良好';if(v<=35)return'普通';
  if(v<=54)return'敏感族群';if(v<=150)return'不健康';
  return'非常不健康';
}
function textColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return(0.299*r+0.587*g+0.114*b)>128?'#000':'#fff';
}

let meta={},daily=[],lmap,markers={},sparks={},selId=null;

async function loadData(){
  try{
    const r=await fetch('kh_sensor_meta.json');
    if(!r.ok)throw new Error();
    meta=await r.json();
  }catch{
    document.getElementById('err-banner').style.display='block';
    return false;
  }
  try{
    const r=await fetch('kh_daily_avg.json');
    if(!r.ok)throw new Error();
    daily=await r.json();
  }catch{
    document.getElementById('err-banner').style.display='block';
    return false;
  }
  return true;
}

function initMap(){
  lmap=L.map('map').setView(KH_CENTER,KH_ZOOM);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(lmap);
}

function getLatest(id){
  if(!daily.length)return null;
  const last=daily[daily.length-1];
  return last[id+'_hourly']??null;
}

function getSparkData(id){
  const key=id+'_hourly';
  return daily.slice(-14).map(d=>d[key]??null);
}

function getRadius(hc){
  return 6+(14-6)*Math.min(1,Math.max(0,(hc-800)/600));
}

function addMapMarkers(){
  const metaArr=Object.values(meta);
  metaArr.forEach(s=>{
    if(!s.lat||!s.lon)return;
    const pm=getLatest(s.device_id);
    const col=aqiColor(pm);
    const m=L.circleMarker([s.lat,s.lon],{
      radius:getRadius(s.hourly_count),
      color:'rgba(255,255,255,0.6)',weight:1,
      fillColor:col,fillOpacity:.88
    }).addTo(lmap).bindPopup(`
      <div style="font-family:'Segoe UI',sans-serif;min-width:160px;">
        <b>${s.name}</b><br>
        <span style="color:${col};font-size:18px;font-weight:700;">${pm!=null?pm.toFixed(1):'N/A'} μg/m³</span><br>
        <small style="color:#888;">${aqiLabel(pm)}</small><br>
        <small>區域：${s.areatype||'—'}</small><br>
        <small>ID：${s.device_id}</small><br>
        <small>資料：${s.time_start?.slice(0,10)} ~ ${s.time_end?.slice(0,10)}</small>
      </div>`);
    m.on('click',()=>selectDev(s.device_id));
    markers[s.device_id]=m;
  });
  Object.entries(KH_EPA).forEach(([k,sta])=>{
    L.circleMarker([sta.lat,sta.lng],{
      radius:7,color:'#aaa',weight:2,
      fillColor:'#90a4ae',fillOpacity:.6,dashArray:'4 3'
    }).addTo(lmap).bindPopup(`<b>${sta.name}</b><br><small>EPA 官方測站</small>`);
  });
}

function renderList(q=''){
  Object.values(sparks).forEach(c=>c.destroy());
  sparks={};
  const box=document.getElementById('devlist');
  box.innerHTML='';
  const arr=Object.values(meta).filter(s=>
    s.name.includes(q)||s.town?.includes(q)||s.device_id.includes(q)||s.area?.includes(q)
  );
  arr.forEach(s=>{
    const pm=getLatest(s.device_id);
    const col=aqiColor(pm);
    const tc=textColor(col);
    const card=document.createElement('div');
    card.className='dcard'+(selId===s.device_id?' sel':'');
    card.dataset.id=s.device_id;
    card.innerHTML=`
      <div class="dtop">
        <span class="dname" title="${s.name}">${s.name}</span>
        <span class="pbadge" style="background:${col};color:${tc};">${pm!=null?pm.toFixed(1):'--'}</span>
      </div>
      <div class="dmeta">${s.town} · ${s.areatype||''} · ${s.hourly_count} 筆</div>
      <div class="spark"><canvas id="sp_${s.device_id}"></canvas></div>`;
    card.addEventListener('click',()=>selectDev(s.device_id));
    box.appendChild(card);
    const ctx=card.querySelector(`#sp_${s.device_id}`);
    const data=getSparkData(s.device_id).map(v=>v??null);
    sparks[s.device_id]=new Chart(ctx,{
      type:'line',
      data:{labels:data.map((_,i)=>i),datasets:[{data,borderColor:col,borderWidth:1.5,pointRadius:0,tension:.3,spanGaps:true,fill:{target:'origin',above:col+'28'}}]},
      options:{animation:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false,min:0}},responsive:true,maintainAspectRatio:false}
    });
  });
}

function selectDev(id){
  selId=id;
  const s=meta[id];
  if(s?.lat){lmap.flyTo([s.lat,s.lon],14,{duration:.8});markers[id]?.openPopup();}
  document.querySelectorAll('.dcard').forEach(c=>c.classList.toggle('sel',c.dataset.id===id));
}

function drawHeatmap(){
  const cv=document.getElementById('hmap');
  const par=cv.parentElement;
  cv.width=par.clientWidth-28;
  cv.height=par.clientHeight-18;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!daily.length||!Object.keys(meta).length)return;
  const ids=Object.keys(meta);
  const nD=daily.length,nY=ids.length;
  const cellW=cv.width/nD,cellH=(cv.height-14)/nY;
  daily.forEach((day,xi)=>{
    ids.forEach((id,yi)=>{
      ctx.fillStyle=aqiColor(day[id+'_hourly']??null);
      ctx.fillRect(xi*cellW+.5,yi*cellH+.5,cellW-1,cellH-1);
    });
  });
  ctx.fillStyle='#9aa3b5';ctx.font='9px Segoe UI';ctx.textAlign='center';
  daily.forEach((day,xi)=>{
    if(xi===0||xi%10===0||xi===nD-1)
      ctx.fillText(day.time.slice(5),(xi+.5)*cellW,nY*cellH+11);
  });
  ctx.textAlign='right';ctx.font='9px Segoe UI';
  ids.forEach((id,yi)=>{
    const label=(meta[id]?.name||id).slice(0,6);
    ctx.fillText(label,-3,(yi+.5)*cellH+3);
  });
}

document.getElementById('srch').addEventListener('input',e=>renderList(e.target.value.trim()));
window.addEventListener('resize',drawHeatmap);

(async()=>{
  initMap();
  const ok=await loadData();
  if(!ok)return;
  const metaArr=Object.values(meta);
  document.getElementById('dcnt').textContent=metaArr.length+' 個感測器';
  if(daily.length){
    document.getElementById('drange').textContent=daily[0].time+' ~ '+daily[daily.length-1].time;
  }
  addMapMarkers();
  renderList();
  drawHeatmap();
  lmap.invalidateSize();
})();
</script>
</body>
</html>
