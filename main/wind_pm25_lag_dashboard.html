<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM2.5 高峰事件診斷</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="wind_pm25_data.js"></script>
<script src="peak_data.js"></script>
<script src="event_diagnosis_data.js"></script>
<link rel="stylesheet" href="css/wind_pm25_lag_dashboard.css">
</head>
<body>
<div class="app">
  <header class="top">
    <div class="top-inner">
      <div>
        <h1>PM2.5 高峰事件診斷</h1>
        <div class="subtitle">用地圖、時間延遲與氣象條件判斷高峰較像傳輸、停滯、區域同步或局部混合。</div>
      </div>
      <div class="controls">
        <label>高峰事件<select id="eventSelect"></select></label>
        <label>PM 測站<select id="pmSelect"></select></label>
        <label>參考風站<select id="windSelect"></select></label>
        <label>PM2.5 顯示時間<input id="offsetRange" type="range" min="-6" max="2" value="0" step="1"></label>
        <div id="offsetReadout" class="lag-readout">0h</div>
        <label>風場相對選中時間<input id="lagRange" type="range" min="-6" max="6" value="4" step="1"></label>
        <div id="lagReadout" class="lag-readout">+4h</div>
        <label>靜風門檻 m/s<input id="calmInput" type="number" min="0" max="2" step="0.1" value="0.5"></label>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="left">
      <div class="card map-card">
        <div id="map"></div>
      </div>
        <div class="map-info">
          <div id="mapStatus" class="map-status"></div>
          <div class="legend">
            <div><span class="dot" style="background:#45c486"></span>PM2.5 低</div>
            <div><span class="dot" style="background:#f2b84b"></span>PM2.5 中</div>
            <div><span class="dot" style="background:#f47b45"></span>PM2.5 高</div>
            <div><span class="dot" style="background:#ef5350"></span>PM2.5 很高</div>
            <div><span class="dot" style="background:#20c6d7;border-radius:2px"></span>CWA 風站</div>
            <div><span class="dot" style="background:#f2b84b"></span>靜風：風向不可靠</div>
          </div>
        </div>

      <div class="charts">
        <div class="card"><div class="panel-title">延遲相關性</div><div class="chart"><canvas id="lagChart"></canvas></div></div>
        <div class="card"><div class="panel-title">PM2.5 與延遲風速</div><div class="chart"><canvas id="seriesChart"></canvas></div></div>
      </div>
    </section>

    <aside class="right">
      <div class="card">
        <div class="panel-title">診斷摘要</div>
        <div class="metrics">
          <div class="metric"><div class="k">類型</div><div id="mClass" class="v">--</div><div id="mWhy" class="s">--</div></div>
          <div class="metric"><div class="k">最佳延遲</div><div id="mBestLag" class="v">--</div><div class="s">最大 |相關|</div></div>
          <div class="metric"><div class="k">配對筆數</div><div id="mPairs" class="v">--</div><div class="s">選中時間 + 風場</div></div>
          <div class="metric"><div class="k">靜風比例</div><div id="mCalm" class="v">--</div><div class="s">目前設定</div></div>
        </div>
      </div>

      <div class="card">
        <div class="panel-title">高峰事件</div>
        <div id="eventList" class="event-list"></div>
      </div>

      <div class="card detail">
        <div class="panel-title">事件細節</div>
        <div id="eventDetail"></div>
        <div class="weather-grid" id="weatherGrid"></div>
      </div>
    </aside>

    <section class="card" style="grid-column:1 / -1">
      <div class="analysis-grid">
        <div>
          <div class="panel-title">風向風速與 PM2.5 極座標</div>
          <canvas id="polar" width="280" height="280"></canvas>
        </div>
        <div>
          <div class="panel-title">高峰時窗診斷指標</div>
          <table>
            <thead><tr><th>指標</th><th>結果</th><th>判讀用途</th></tr></thead>
            <tbody id="diagnosisTable"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="js/wind_pm25_lag_dashboard.js"></script>
</body>
</html>
